# ~/.gnupg/gpg.conf — managed by dotfiles
#
# General GnuPG configuration. The default signing key is intentionally NOT
# set here — it lives with your identity in the gitignored
# ~/.gitconfig.local (user.signingkey), keeping this file machine-agnostic.
# To use a default key for standalone `gpg` operations, add locally:
#   default-key <YOUR_KEY_ID>

# Display long key IDs and full fingerprints
keyid-format 0xlong
with-fingerprint

# Show UID validity in key listings and signature verification
list-options show-uid-validity
verify-options show-uid-validity

# Quieter, reproducible output
no-greeting
no-emit-version
no-comments

# Protect against certain key-substitution attacks on signing subkeys
require-cross-certification

# Strong algorithm preferences for new keys and default output
personal-cipher-preferences AES256 AES192 AES
personal-digest-preferences SHA512 SHA384 SHA256
personal-compress-preferences ZLIB BZIP2 ZIP Uncompressed
default-preference-list SHA512 SHA384 SHA256 AES256 AES192 AES ZLIB BZIP2 ZIP Uncompressed
cert-digest-algo SHA512
s2k-digest-algo SHA512
s2k-cipher-algo AES256

# Use UTF-8
charset utf-8
