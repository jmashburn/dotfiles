# ~/.gnupg/gpg-agent.conf — managed by dotfiles
#
# Reload after changes: gpgconf --reload gpg-agent

# Cache passphrases for 24h (86400s). Timers reset on agent restart / logout.
default-cache-ttl 86400
max-cache-ttl 86400

# Same policy for SSH keys served by gpg-agent
default-cache-ttl-ssh 86400
max-cache-ttl-ssh 86400

# Allow loopback pinentry (headless / scripted signing, e.g. pass in CI)
allow-loopback-pinentry

# Pinentry is auto-discovered from PATH. To pin a specific program:
#   pinentry-program /usr/bin/pinentry-curses        # Linux / WSL (terminal)
#   pinentry-program /usr/bin/pinentry-gnome3        # Linux (GUI)
#   pinentry-program /opt/homebrew/bin/pinentry-mac  # macOS (Apple Silicon)
#   pinentry-program /usr/local/bin/pinentry-mac     # macOS (Intel)
